site_name: Jellysweep
site_url: https://jon4hz.github.io/jellysweep/
repo_url: https://github.com/jon4hz/jellysweep
theme:
  name: material
  logo: assets/jellysweep.png
  favicon: assets/jellysweep.png
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  features:
    - content.action.edit
    - navigation.footer
    - search.share
    - search.suggest
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font:
    text: Inter
    code: Roboto Mono

extra_css:
  - stylesheets/extra.css

plugins:
  - search

edit_uri: edit/main/docs/

extra:
  generator: false
  # maybe?
  # version:
  #   provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jon4hz/jellysweep
    - icon: fontawesome/brands/docker
      link: https://github.com/jon4hz/jellysweep/pkgs/container/jellysweep

copyright: Copyright &copy; 2025 - 2026 The Jellysweep Contributors
